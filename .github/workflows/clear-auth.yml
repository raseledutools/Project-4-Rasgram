name: Clear Firebase Auth

on:
  workflow_dispatch:

jobs:
  clear-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install Firebase Admin
        run: npm install firebase-admin
        
      - name: Delete Auth Users
        run: |
          cat << 'EOF' > delete_users.js
          const admin = require("firebase-admin");
          const serviceAccount = require("./app/src/main/res/raw/service_account.json");
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
          
          async function clearUsers() {
            let pageToken;
            do {
              const result = await admin.auth().listUsers(1000, pageToken);
              const uids = result.users.map(u => u.uid);
              if (uids.length > 0) {
                await admin.auth().deleteUsers(uids);
                console.log(`Deleted ${uids.length} users`);
              } else {
                console.log("No more users");
              }
              pageToken = result.pageToken;
            } while (pageToken);
          }
          clearUsers();
          EOF
          node delete_users.js